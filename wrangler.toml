name = "blackroad-tools"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "blackroad-continuity"
database_id = "f0721506-cb52-41ee-b587-38f7b42b97d9"

[[kv_namespaces]]
binding = "TOOLS_KV"
id = "f7b2b20d1e1447b2917b781e6ab7e45c"

# Contributor API key store – create with: wrangler kv:namespace create API_KEYS_KV
# then replace REPLACE_WITH_API_KEYS_KV_NAMESPACE_ID below with the returned ID (required before first deploy)
[[kv_namespaces]]
binding = "API_KEYS_KV"
id = "REPLACE_WITH_API_KEYS_KV_NAMESPACE_ID"

# Stripe webhook secret – set with: wrangler secret put STRIPE_WEBHOOK_SECRET
# [secrets]
# STRIPE_WEBHOOK_SECRET

[observability]
enabled = true
